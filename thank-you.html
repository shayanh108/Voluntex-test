<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - VoluntEx</title>
  <meta http-equiv="refresh" content="10;url=contact.html" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="dark-mode.css">
  <link rel="stylesheet" href="font.css">
  <link rel="stylesheet" href="theme.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1a1040 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .checkmark {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 24px rgba(16, 185, 129, 0.4);
    }

    .back-btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.65rem 1.8rem;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 18px rgba(99, 102, 241, 0.4);
    }
    .back-btn:hover {
      opacity: 0.88;
      transform: scale(1.03);
    }

    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      margin-top: 2rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      border-radius: 99px;
      animation: drain 10s linear forwards;
    }
    @keyframes drain {
      from { width: 100%; }
      to   { width: 0%; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="checkmark">
      <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    </div>

    <h1 style="font-size:1.9rem;font-weight:700;color:#f1f5f9;margin-bottom:0.75rem;">
      Message Sent!
    </h1>

    <p style="color:#94a3b8;font-size:1rem;line-height:1.6;margin-bottom:0.5rem;">
      Thank you for reaching out to VoluntEx.<br>We'll get back to you as soon as possible.
    </p>

    <p style="color:#64748b;font-size:0.82rem;">
      You'll be redirected automatically in 10 seconds.
    </p>

    <a href="contact.html" class="back-btn">Go back now</a>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

  </div>
</body>
</html>
