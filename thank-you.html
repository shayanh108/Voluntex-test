  <div class="max-w-lg w-full bg-white rounded-2xl shadow-md p-10 text-center">
    
    <h1 class="text-3xl font-semibold text-gray-900 mb-4">

    <p class="text-gray-600 text-lg mb-6">

    </p>

    <p class="text-sm text-gray-500 mb-6">

    <a href="/contact.html"
